name: Build and Deploy Dockerfile

on:
  push:
    branches: [main]

concurrency:
  group: "build"

env:
  DOCKER_TAG: ${{ secrets.DOCKER_HUB_USERNAME }}/htmx-blog:latest

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: jdx/mise-action@v4
      - name: Check build
        run: |
          templ generate
          go build
      - name: Check links
        run: |
          go run . -log warn &
          sleep 3
          npx broken-link-checker http://localhost:3000 -ro \
            --exclude "https://freefrontend.com/*" \
            --exclude "https://nixos.org/*" \
            --exclude "https://woile.dev/*" \
            --exclude "https://www.sfml-dev.org/"

  website:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Enable magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build Docker image using Nix
        run: nix build ".#docker"

      - name: Load image
        run: |
          export IMAGE_TAG=$(docker load < result | grep -Po 'Loaded image: \K.*')
          echo "Pushing image ${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Push image
        run: |
          docker tag $IMAGE_TAG $DOCKER_TAG
          docker push $DOCKER_TAG
